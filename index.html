<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestPorn</title>
    <style>
        /* General Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Roboto", Arial, sans-serif; }
        body { background-color: #0f0f0f; color: white; overflow-x: hidden; }

        /* Header / Logo Area */
        header {
            height: 56px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: #0f0f0f;
            z-index: 100;
        }
        .logo { 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            letter-spacing: -0.5px;
        }

        /* Home Page Grid */
        .container { padding: 24px; }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .video-card { cursor: pointer; border-radius: 12px; overflow: hidden; }
        
        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #272727;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-radius 0.2s;
        }
        .video-card:hover .thumbnail { border-radius: 0px; }
        
        .thumbnail video { width: 100%; height: 100%; object-fit: cover; }
        
        .video-info { padding: 12px 4px; }
        .video-title { font-weight: 600; font-size: 16px; margin-bottom: 6px; line-height: 1.4; }
        .video-meta { color: #aaa; font-size: 14px; }

        /* Video Player Page */
        #player-page { display: none; padding: 20px; max-width: 1280px; margin: 0 auto; }
        .video-wrapper { width: 100%; background: black; border-radius: 12px; overflow: hidden; }
        .main-video { width: 100%; aspect-ratio: 16/9; display: block; }
        
        .player-info { margin-top: 20px; border-bottom: 1px solid #3f3f3f; padding-bottom: 20px; }
        .player-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        
        .controls-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        /* Buttons */
        button {
            background: #272727; 
            border: none; 
            color: white;
            padding: 8px 16px; 
            border-radius: 18px; 
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        button:hover { background: #3f3f3f; }
        .back-btn { background: #cc0000; margin-left: auto; }
        .back-btn:hover { background: #ff0000; }

        .speed-indicator { font-size: 14px; color: #aaa; margin-left: 8px; font-weight: bold; }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="goHome()">BestPorn</div>
    </header>

    <main id="home-page" class="container">
        <div class="video-grid" id="video-container">
            </div>
    </main>

    <main id="player-page">
        <div class="video-wrapper">
            <video id="video-element" class="main-video" controls autoplay></video>
        </div>
        
        <div class="player-info">
            <h2 id="video-display-title" class="player-title">Loading Title...</h2>
            <div class="controls-bar">
                <button onclick="changeSpeed(0.5)">0.5x</button>
                <button onclick="changeSpeed(1)">Normal</button>
                <button onclick="changeSpeed(1.5)">1.5x</button>
                <button onclick="changeSpeed(2)">2x</button>
                <span id="current-speed" class="speed-indicator">Speed: 1x</span>
                
                <button class="back-btn" onclick="goHome()">Back to Home</button>
            </div>
        </div>
    </main>

    <script>
        const NAME_FILE_URL = "https://raw.githubusercontent.com/JayLayDayFae/BestPorn/refs/heads/main/NameCard1";
        const VIDEO_SRC = "https://files.catbox.moe/2zz5q0.mp4";

        const homePage = document.getElementById('home-page');
        const playerPage = document.getElementById('player-page');
        const videoElement = document.getElementById('video-element');
        const videoTitleText = document.getElementById('video-display-title');
        const speedLabel = document.getElementById('current-speed');
        const videoContainer = document.getElementById('video-container');

        async function initPage() {
            let videoName = "Loading Video...";
            
            try {
                // Fetch the name. Adding a random timestamp (?t=...) prevents 
                // the browser from showing an old cached version of the file.
                const response = await fetch(`${NAME_FILE_URL}?t=${new Date().getTime()}`);
                
                if (response.ok) {
                    const content = await response.text();
                    if (content.trim()) {
                        videoName = content.trim();
                    } else {
                        videoName = "Unnamed Video";
                    }
                } else {
                    videoName = "Featured Video";
                }
            } catch (err) {
                console.error("Fetch error:", err);
                videoName = "Featured Video";
            }

            // Build the video card
            videoContainer.innerHTML = `
                <div class="video-card" onclick="openVideo('${VIDEO_SRC}', '${videoName.replace(/'/g, "\\'")}')">
                    <div class="thumbnail">
                        <video src="${VIDEO_SRC}#t=0.1" muted></video>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${videoName}</div>
                        <div class="video-meta">BestPorn • Just now</div>
                    </div>
                </div>
            `;
        }

        function openVideo(url, title) {
            homePage.classList.add('hidden');
            playerPage.style.display = 'block';
            videoElement.src = url;
            videoTitleText.innerText = title;
            videoElement.playbackRate = 1;
            speedLabel.innerText = "Speed: 1x";
            window.scrollTo(0, 0);
        }

        function goHome() {
            videoElement.pause();
            playerPage.style.display = 'none';
            homePage.classList.remove('hidden');
        }

        function changeSpeed(rate) {
            videoElement.playbackRate = rate;
            speedLabel.innerText = `Speed: ${rate}x`;
        }

        // Initialize on load
        initPage();
    </script>
</body>
</html>
