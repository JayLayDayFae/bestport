<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestPorn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0f0f0f; color: white; }

        /* Header */
        header {
            height: 56px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: #0f0f0f;
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: bold; cursor: pointer; }

        /* Home Grid */
        .container { padding: 20px; }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .video-card { cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: scale(1.02); }
        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thumbnail video { width: 100%; height: 100%; object-fit: cover; }
        .video-info { margin-top: 12px; }
        .video-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .video-meta { color: #aaa; font-size: 14px; }

        /* Player Page (Hidden by default) */
        #player-page { display: none; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .main-video { width: 100%; border-radius: 12px; background: black; }
        .controls { margin-top: 15px; display: flex; gap: 10px; align-items: center; }
        button {
            background: #272727; border: none; color: white;
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
        }
        button:hover { background: #3f3f3f; }
        .speed-label { font-size: 14px; color: #aaa; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="goHome()">BestPorn</div>
    </header>

    <div id="home-page" class="container">
        <div class="video-grid">
            <div class="video-card" onclick="openVideo('https://files.catbox.moe/2zz5q0.mp4', 'Featured Video')">
                <div class="thumbnail">
                    <video src="https://files.catbox.moe/2zz5q0.mp4#t=0.1" muted></video>
                </div>
                <div class="video-info">
                    <div class="video-title">Featured Video</div>
                    <div class="video-meta">BestPorn Original • 1.2M views</div>
                </div>
            </div>
            
            <div class="video-card"><div class="thumbnail"></div><div class="video-info"><div class="video-title">Coming Soon</div></div></div>
            <div class="video-card"><div class="thumbnail"></div><div class="video-info"><div class="video-title">Coming Soon</div></div></div>
        </div>
    </div>

    <div id="player-page">
        <video id="video-element" class="main-video" controls autoplay></video>
        <h2 id="video-display-title" style="margin-top:15px;"></h2>
        <div class="controls">
            <button onclick="changeSpeed(0.5)">0.5x</button>
            <button onclick="changeSpeed(1)">Normal</button>
            <button onclick="changeSpeed(1.5)">1.5x</button>
            <button onclick="changeSpeed(2)">2x</button>
            <span class="speed-label" id="current-speed">Speed: 1x</span>
            <button onclick="goHome()" style="margin-left: auto; background: #cc0000;">Back to Home</button>
        </div>
    </div>

    <script>
        const homePage = document.getElementById('home-page');
        const playerPage = document.getElementById('player-page');
        const videoElement = document.getElementById('video-element');
        const videoTitle = document.getElementById('video-display-title');
        const speedText = document.getElementById('current-speed');

        function openVideo(url, title) {
            homePage.classList.add('hidden');
            playerPage.style.display = 'block';
            videoElement.src = url;
            videoTitle.innerText = title;
            videoElement.playbackRate = 1;
            speedText.innerText = "Speed: 1x";
        }

        function goHome() {
            videoElement.pause();
            playerPage.style.display = 'none';
            homePage.classList.remove('hidden');
        }

        function changeSpeed(rate) {
            videoElement.playbackRate = rate;
            speedText.innerText = `Speed: ${rate}x`;
        }
    </script>
</body>
</html>
